<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Traductor Azure</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4" id="titulo_principal">TRADUCTOR</h1>   
        <div class="card p-4 shadow-sm">
            <form id="traductor-form">
                <div class="mb-3">
                    <p><strong>Idioma detectado:</strong> <span id="idioma-detectado"></span></p>
                    <label class="form-label">Texto a traducir:</label>
                    <textarea name="texto_a_traducir" id="texto_a_traducir" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Traducir a:</label>
                    <select name="idioma_destino" id="idioma_destino" class="form-select">
                        {% for codigo, nombre in idiomas.items() %}
                            <option value="{{ codigo }}" {% if codigo == 'en' %}selected{% endif %}>{{ nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- BOTONES -->
                <div class="d-grid gap-2">
                   
                    <button type="button" id="btn-voz" class="btn btn-secondary">Hablar para escribir</button>
                    <button type="button" id="btn-audio" class="btn btn-success">Escuchar traducción</button>
                </div>
            </form>

            <!-- RESULTADO -->
            <div class="mt-4 p-3 border rounded bg-white" id="resultado-box" style="display:none;">
                <h5>Traducción:</h5>
                <p id="texto-traducido" class="lead text-primary"></p>

                <!-- REPRODUCTOR -->
                <audio id="audio-player" controls style="display:none;"></audio>
            </div>
        </div>
    </div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
